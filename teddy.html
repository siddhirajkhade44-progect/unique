<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>

<style>
body{
background: linear-gradient(135deg,#ffd1dc,#ffe6f0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family: Arial;
}

.container{
text-align:center;
}

h1{
color:#ff4d88;
margin-bottom:40px;
}

.teddy{
font-size:100px;
}

.kiss{
font-size:60px;
animation: kissmove 2s infinite;
}

@keyframes kissmove{
0%{transform: translateX(0);}
50%{transform: translateX(20px);}
100%{transform: translateX(0);}
}
</style>
</head>

<body>

<div class="container">
<h1>For My Cute Girl 💕</h1>

<div class="teddy">
🐻 <span class="kiss">💋</span> 🐻
</div>

<p>I love you so much ❤️</p>

</div>

</body>
</html>
